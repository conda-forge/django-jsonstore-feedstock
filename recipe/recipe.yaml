# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.5.1"

package:
  name: django-jsonstore
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-jsonstore/django-jsonstore-${{ version }}.tar.gz
  sha256: fe49dd134b2c86ac434f77244be28102616783521c22de6d361879824b6d1a27

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - django
    - six

tests:
  - python:
      imports:
        - jsonstore
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: http://github.com/viewflow/jsonstore
  license: AGPL-3.0-only
  license_file: LICENSE
  summary: Expose JSONField data as a virtual django model fields.
  description: |
    Expose JSONField data as a virtual django model fields.

extra:
  recipe-maintainers:
    - rxm7706
    - cshaley
